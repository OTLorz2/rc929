<!--
  HTML shell for rc929 research reports. Agents do NOT copy this file — write Markdown per
  markdown-report-guide.md, then run scripts/md-to-html.mjs to inject content.

  Do NOT remove or rewrite: CSS, bottom <script>, layout structure, diagram-fs-btn fullscreen, toc-rail JS,
  highlight.js CDN, or highlightSnippets() init for pre.snippet evidence blocks.

  Placeholders filled by md-to-html.mjs:
    {{TITLE}}, {{HERO_EYEBROW}}, {{HERO_TITLE}}, {{META_PILLS}}, {{QUESTION}},
    {{TOC_ITEMS}}, {{MAIN_CONTENT}}, {{FOOTER}}

  ID rule: section id="<slug>" (e.g. summary, diagrams). Mermaid subgraph/node ids MUST use sg_ / n_
  prefixes and never equal a section id (prevents TOC anchor jumping into SVG).

  TOC: href="#<slug>" and link text MUST equal that section's <h2> exactly.
  Diagrams: wrap in .diagram-wrap > pre.mermaid; setupDiagramFullscreen() adds .diagram-fs-btn after render.
  Layout: follow html-report-guide.md § Diagram layout (split dense graphs; ≤10 nodes per flowchart).

  Mermaid: loaded via ES module (mermaid@11 + @mermaid-js/layout-elk). Bottom <script type="module"> must stay intact.
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/base16/default-light.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <style>
    :root {
      --bg: #e4d9c8;
      --bg-deep: #d4c4ae;
      --surface: #f6f0e6;
      --surface-2: #ebe2d4;
      --text: #1e2a22;
      --muted: #5a6b5e;
      --moss: #2a4a3a;
      --sage: #4d7359;
      --clay: #b56a4a;
      --amber: #9a7224;
      --border: rgba(42,74,58,.14);
      --diagram-bg: #f0e8da;
      --shadow: rgba(30,42,34,.08);
      --display: 'Fraunces', Georgia, serif;
      --body: 'Libre Baskerville', Georgia, serif;
      --mono: 'IBM Plex Mono', monospace;
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 10px;
      --rail-w: 220px;
      --page-max: 1400px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
    body {
      margin: 0;
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.72;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .45;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.35'/%3E%3C/svg%3E");
    }
    .scroll-progress {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      z-index: 300;
      background: linear-gradient(90deg, var(--sage), var(--clay));
      transition: width .12s linear;
    }
    .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
    }
    .blob-a { width: 55vw; height: 55vw; top: -20%; right: -15%; background: radial-gradient(circle, rgba(77,115,89,.5), transparent 70%); }
    .blob-b { width: 45vw; height: 45vw; bottom: 10%; left: -20%; background: radial-gradient(circle, rgba(181,106,74,.35), transparent 70%); }
    .blob-c { width: 30vw; height: 30vw; top: 45%; right: 5%; background: radial-gradient(circle, rgba(154,114,36,.2), transparent 70%); }

    .page { position: relative; z-index: 1; }

    /* ── Hero ── */
    .hero {
      padding: clamp(1.25rem, 3vw, 2rem) clamp(1rem, 2vw, 1.5rem) 1.5rem;
      max-width: var(--page-max);
      margin: 0 auto;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr minmax(320px, 480px);
      gap: 2.5rem;
      align-items: end;
    }
    @media (max-width: 820px) { .hero-grid { grid-template-columns: 1fr; } }
    .hero-eyebrow {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: .75rem;
    }
    .hero h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 5vw, 3.1rem);
      font-weight: 700;
      line-height: 1.08;
      margin: 0;
      color: var(--moss);
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: 1.25rem;
    }
    .meta-pill {
      font-family: var(--mono);
      font-size: .72rem;
      padding: .35rem .75rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .meta-pill strong { color: var(--text); font-weight: 500; }
    .question-panel {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.5rem 1.65rem;
      box-shadow: 0 20px 50px var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .question-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, var(--sage), transparent 40%, var(--clay));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .question-panel p { margin: 0; font-size: .95rem; }

    /* ── TOC rail ── */
    .shell {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 0 clamp(.75rem, 1.5vw, 1.25rem) 4rem;
      gap: 0 2rem;
    }
    .toc-rail-wrap {
      width: var(--rail-w);
      flex-shrink: 0;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      nav.toc-rail {
        position: static;
        width: auto;
        height: auto;
        left: auto;
        top: auto;
        overflow: visible;
        display: block;
      }
      nav.toc-rail .toc-inner { transform: none !important; }
    }
    nav.toc-rail {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--rail-w);
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
      z-index: 10;
      pointer-events: none;
    }
    nav.toc-rail .toc-inner {
      width: 100%;
      pointer-events: auto;
    }
    .toc-title {
      font-family: var(--mono);
      font-size: .82rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }
    nav.toc-rail ol {
      list-style: none;
      margin: 0;
      padding: 0 0 0 1.5rem;
      border-left: 2px solid var(--border);
    }
    nav.toc-rail li { margin: 0; }
    nav.toc-rail a {
      display: flex;
      align-items: baseline;
      gap: .5rem;
      padding: .45rem 0 .45rem .85rem;
      margin-left: -1.5rem;
      text-decoration: none;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.35;
      border-left: 2px solid transparent;
      margin-bottom: .15rem;
      transition: color .2s, border-color .2s, padding-left .2s;
    }
    nav.toc-rail a:hover,
    nav.toc-rail a.active {
      color: var(--moss);
      border-left-color: var(--sage);
      padding-left: 1rem;
    }
    nav.toc-rail a .idx {
      font-family: var(--mono);
      font-size: .62rem;
      opacity: .5;
      flex-shrink: 0;
    }

    main { min-width: 0; padding: .5rem 0; }

    /* ── Sections ── */
    section {
      margin-bottom: 3.5rem;
      scroll-margin-top: 1.5rem;
    }
    .section-head {
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .section-num {
      font-family: var(--display);
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      color: var(--sage);
      opacity: .25;
    }
    section h2 {
      font-family: var(--display);
      font-size: 1.55rem;
      font-weight: 700;
      margin: 0;
      color: var(--moss);
    }

    /* Summary */
    #summary .summary-list {
      margin: 0;
      padding-left: 1.4rem;
    }
    #summary .summary-list li {
      margin-bottom: .85rem;
      line-height: 1.65;
    }
    #summary .summary-list li:last-child { margin-bottom: 0; }
    #summary .summary-list li strong { font-weight: 700; }

    /* Section prose */
    .section-prose {
      margin-bottom: 1.75rem;
      max-width: 68ch;
    }
    .section-prose p {
      margin: 0 0 .85rem;
      font-size: .95rem;
      line-height: 1.78;
      color: var(--text);
    }
    .section-prose p:last-child { margin-bottom: 0; }

    /* Diagrams */
    .diagram-wrap {
      position: relative;
      background: var(--diagram-bg);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin: 0;
      overflow-x: auto;
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4);
    }
    .diagram-stage {
      position: relative;
    }
    .diagram-fs-btn {
      position: absolute;
      top: .65rem;
      right: .65rem;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--moss);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 4px 14px var(--shadow);
      transition: opacity .2s, background .2s, color .2s, transform .2s;
    }
    .diagram-fs-btn svg {
      width: 1rem;
      height: 1rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .diagram-wrap:hover .diagram-fs-btn,
    .diagram-fs-btn:focus-visible {
      opacity: 1;
      pointer-events: auto;
    }
    .diagram-fs-btn:hover {
      background: rgba(77, 115, 89, .12);
      color: var(--sage);
      border-color: rgba(77, 115, 89, .22);
      transform: scale(1.05);
    }
    @media (hover: none) {
      .diagram-fs-btn {
        opacity: .9;
        pointer-events: auto;
      }
    }
    .diagram-fs-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      margin: 0;
      background: var(--diagram-bg);
      animation: fs-in .25s ease;
    }
    .diagram-fs-overlay.is-closing {
      animation: fs-out .2s ease forwards;
    }
    @keyframes fs-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fs-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    .diagram-fs-panel {
      position: relative;
      flex: 1;
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 0;
      background: var(--diagram-bg);
      box-shadow: none;
      display: grid;
      place-items: center;
    }
    .diagram-fs-panel .mermaid {
      display: block;
      text-align: center;
    }
    .diagram-fs-panel .mermaid svg {
      display: block;
      max-width: none;
      max-height: none;
    }
    .diagram-fs-close {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 501;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--moss);
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .diagram-fs-close svg {
      width: 1.1rem;
      height: 1.1rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }
    .diagram-fs-close:hover {
      background: var(--clay);
      color: var(--surface);
    }
    .diagram-caption {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      margin-top: 1rem;
      line-height: 1.5;
    }
    .mermaid { text-align: center; }
    .mermaid svg { max-width: 100%; height: auto; }

    /* Timeline steps */
    .card-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      padding-left: 2rem;
    }
    .card-grid::before {
      content: '';
      position: absolute;
      left: .55rem;
      top: 1.5rem;
      bottom: 1.5rem;
      width: 2px;
      background: linear-gradient(180deg, var(--sage), var(--clay), var(--amber));
      border-radius: 2px;
    }
    .step-card {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.4rem 1.25rem 1.6rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      box-shadow: 0 3px 16px var(--shadow);
      transition: transform .25s;
    }
    .step-card::before {
      content: '';
      position: absolute;
      left: -1.72rem;
      top: 1.45rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--surface);
      border: 3px solid var(--sage);
      box-shadow: 0 0 0 4px var(--bg);
    }
    .step-card:hover { transform: translateX(4px); }
    .step-card .num {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .1em;
      color: var(--clay);
      text-transform: uppercase;
      margin-bottom: .35rem;
    }
    .step-card h4 {
      font-family: var(--display);
      font-size: 1.05rem;
      margin: 0 0 .5rem;
      color: var(--moss);
    }
    .step-card p { margin: 0 0 .65rem; font-size: .9rem; color: var(--muted); }

    code, .ref {
      font-family: var(--mono);
      font-size: .82em;
      font-weight: 500;
      background: var(--surface-2);
      padding: .12em .4em;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .ref { color: var(--sage); white-space: nowrap; }
    .step-card .ref { margin: .15rem .3rem .15rem 0; display: inline-block; font-size: .75rem; }

    /* Table */
    .table-wrap {
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 6px 28px var(--shadow);
      background: var(--surface);
    }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th, td { text-align: left; padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
    th {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--moss);
      background: rgba(77,115,89,.08);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(77,115,89,.04); }

    /* Evidence */
    .evidence-stack { display: flex; flex-direction: column; gap: .65rem; }
    details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: box-shadow .2s;
    }
    details[open] { box-shadow: 0 8px 28px var(--shadow); }
    details summary {
      padding: .85rem 1.15rem;
      cursor: pointer;
      font-family: var(--display);
      font-size: .95rem;
      color: var(--moss);
      list-style: none;
      display: flex;
      align-items: center;
      gap: .65rem;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before {
      content: '◦';
      color: var(--clay);
      font-size: 1.2rem;
      transition: transform .2s;
    }
    details[open] summary::before { content: '●'; transform: scale(.85); }
    details[open] summary { border-bottom: 1px solid var(--border); background: rgba(77,115,89,.05); }
    pre.snippet {
      margin: 0;
      padding: 1.1rem 1.25rem;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: .74rem;
      line-height: 1.55;
      color: var(--moss);
      background: var(--surface-2);
    }
    pre.snippet.hljs {
      background: var(--surface-2);
      color: var(--moss);
    }
    pre.snippet .hljs-keyword,
    pre.snippet .hljs-selector-tag { color: var(--moss); font-weight: 500; }
    pre.snippet .hljs-string,
    pre.snippet .hljs-regexp { color: var(--clay); }
    pre.snippet .hljs-comment,
    pre.snippet .hljs-quote { color: var(--muted); font-style: italic; }
    pre.snippet .hljs-number,
    pre.snippet .hljs-literal { color: var(--amber); }
    pre.snippet .hljs-title,
    pre.snippet .hljs-built_in,
    pre.snippet .hljs-type { color: var(--sage); }
    pre.snippet .hljs-attr,
    pre.snippet .hljs-name { color: var(--moss); }

    /* Gaps */
    #gaps ul {
      margin: 0;
      padding-left: 1.4rem;
    }
    #gaps li {
      margin-bottom: .85rem;
      line-height: 1.65;
    }
    #gaps li:last-child { margin-bottom: 0; }
    #gaps li strong { font-weight: 700; }

    footer {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 1.5rem clamp(.75rem, 1.5vw, 1.25rem) 3rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      border-top: 1px dashed var(--border);
      text-align: center;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: none; }
    }
    section { animation: rise .65s ease both; }
    section:nth-child(2) { animation-delay: .05s; }
    section:nth-child(3) { animation-delay: .1s; }
    section:nth-child(4) { animation-delay: .15s; }
    section:nth-child(5) { animation-delay: .2s; }
    section:nth-child(6) { animation-delay: .25s; }
    section:nth-child(7) { animation-delay: .3s; }
  </style>
</head>
<body>
  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>

  <div class="page">
    <header class="hero">
      <div class="hero-grid">
        <div>
          <p class="hero-eyebrow">{{HERO_EYEBROW}}</p>
          <h1>{{HERO_TITLE}}</h1>
          <div class="meta-row">
            {{META_PILLS}}
          </div>
        </div>
        <div class="question-panel">
          <p><strong>研究问题：</strong>{{QUESTION}}</p>
        </div>
      </div>
    </header>

    <div class="shell">
      <div class="toc-rail-wrap">
        <nav class="toc-rail" aria-label="目录">
          <div class="toc-inner">
            <div class="toc-title">目录</div>
            <ol>
              <!-- href="#<slug>" text MUST match <section id="<slug>"><h2>…</h2> -->
              {{TOC_ITEMS}}
            </ol>
          </div>
        </nav>
      </div>

      <main>
        {{MAIN_CONTENT}}
      </main>
    </div>

    <footer>{{FOOTER}}</footer>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.6.0/dist/mermaid.esm.min.mjs';
    import elkLayouts from 'https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0.1.9/dist/mermaid-layout-elk.esm.min.mjs';

    mermaid.registerLayoutLoaders(elkLayouts);

    (function () {
      document.querySelectorAll('pre.mermaid').forEach(function (el) {
        el.dataset.mermaidSource = el.textContent.trim();
      });

      (async function renderMermaid() {
        mermaid.initialize({
          startOnLoad: false,
          securityLevel: 'loose',
          theme: 'neutral',
          layout: 'dagre',
          flowchart: {
            useMaxWidth: true,
            htmlLabels: true,
            curve: 'basis',
            padding: 20,
            nodeSpacing: 60,
            rankSpacing: 80
          }
        });
        var nodes = document.querySelectorAll('pre.mermaid');
        nodes.forEach(function (el) {
          var src = el.dataset.mermaidSource || el.textContent.trim();
          el.dataset.mermaidSource = src;
          el.textContent = src;
          el.removeAttribute('data-processed');
        });
        if (typeof mermaid.run === 'function') await mermaid.run({ nodes: nodes });
        else await mermaid.init(undefined, nodes);
        setupDiagramFullscreen();
        highlightSnippets();
      })();

      function highlightSnippets() {
        if (typeof hljs === 'undefined') return;
        document.querySelectorAll('pre.snippet').forEach(function (el) {
          if (el.classList.contains('hljs')) return;
          if ([].slice.call(el.classList).some(function (c) { return c.indexOf('language-') === 0; })) {
            hljs.highlightElement(el);
          } else {
            var result = hljs.highlightAuto(el.textContent);
            el.innerHTML = result.value;
            el.classList.add('hljs');
            if (result.language) el.classList.add('language-' + result.language);
          }
        });
      }

      var fsIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>';
      var closeIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';

      function closeDiagramFullscreen(overlay) {
        if (!overlay || overlay.classList.contains('is-closing')) return;
        if (overlay._onResize) {
          window.removeEventListener('resize', overlay._onResize);
        }
        if (overlay._onWheel && overlay._panel) {
          overlay._panel.removeEventListener('wheel', overlay._onWheel);
        }
        overlay.classList.add('is-closing');
        overlay.addEventListener('animationend', function () {
          overlay.remove();
          document.body.style.overflow = '';
        }, { once: true });
      }

      function applyDiagramZoom(panel, zoom) {
        var svg = panel.querySelector('.mermaid svg');
        if (!svg) return;

        var viewBox = svg.viewBox && svg.viewBox.baseVal;
        var vbWidth = viewBox && viewBox.width ? viewBox.width : svg.getBoundingClientRect().width;
        var vbHeight = viewBox && viewBox.height ? viewBox.height : svg.getBoundingClientRect().height;
        if (!vbWidth || !vbHeight) return;

        var vw = panel.clientWidth || window.innerWidth;
        var vh = panel.clientHeight || window.innerHeight;
        var baseScale = Math.min(vw / vbWidth, vh / vbHeight);
        var width = Math.floor(vbWidth * baseScale * zoom);
        var height = Math.floor(vbHeight * baseScale * zoom);

        svg.style.width = width + 'px';
        svg.style.height = height + 'px';
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        panel.dataset.zoom = String(zoom);
      }

      function openDiagramFullscreen(mermaidEl) {
        var overlay = document.createElement('div');
        overlay.className = 'diagram-fs-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        overlay.setAttribute('aria-label', '图表全屏预览');

        var panel = document.createElement('div');
        panel.className = 'diagram-fs-panel';
        panel.dataset.zoom = '1';

        var closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.className = 'diagram-fs-close';
        closeBtn.setAttribute('aria-label', '退出全屏');
        closeBtn.innerHTML = closeIcon;

        var clone = mermaidEl.cloneNode(true);
        clone.removeAttribute('data-processed');
        panel.appendChild(clone);
        overlay.appendChild(panel);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        applyDiagramZoom(panel, 1);
        closeBtn.focus();

        function onKeydown(e) {
          if (e.key === 'Escape') closeDiagramFullscreen(overlay);
        }

        function onResize() {
          var zoom = parseFloat(panel.dataset.zoom || '1');
          applyDiagramZoom(panel, zoom);
        }

        function onWheel(e) {
          if (!e.ctrlKey) return;
          e.preventDefault();

          var zoom = parseFloat(panel.dataset.zoom || '1');
          var factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
          var nextZoom = Math.min(5, Math.max(0.25, zoom * factor));
          if (nextZoom === zoom) return;

          var rect = panel.getBoundingClientRect();
          var offsetX = e.clientX - rect.left + panel.scrollLeft;
          var offsetY = e.clientY - rect.top + panel.scrollTop;
          var ratio = nextZoom / zoom;

          applyDiagramZoom(panel, nextZoom);
          panel.scrollLeft = offsetX * ratio - (e.clientX - rect.left);
          panel.scrollTop = offsetY * ratio - (e.clientY - rect.top);
        }

        overlay._panel = panel;
        overlay._onResize = onResize;
        overlay._onWheel = onWheel;
        closeBtn.addEventListener('click', function () { closeDiagramFullscreen(overlay); });
        panel.addEventListener('wheel', onWheel, { passive: false });
        window.addEventListener('resize', onResize);
        document.addEventListener('keydown', onKeydown);
        overlay.addEventListener('animationend', function () {
          if (overlay.classList.contains('is-closing')) {
            document.removeEventListener('keydown', onKeydown);
          }
        });
      }

      function setupDiagramFullscreen() {
        document.querySelectorAll('.diagram-wrap').forEach(function (wrap) {
          var mermaidEl = wrap.querySelector('.mermaid');
          if (!mermaidEl || !mermaidEl.querySelector('svg')) return;

          var stage = wrap.querySelector('.diagram-stage');
          if (!stage) {
            stage = document.createElement('div');
            stage.className = 'diagram-stage';
            wrap.insertBefore(stage, mermaidEl);
            stage.appendChild(mermaidEl);
          }

          if (wrap.querySelector('.diagram-fs-btn')) return;

          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'diagram-fs-btn';
          btn.setAttribute('aria-label', '全屏查看');
          btn.innerHTML = fsIcon;
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            openDiagramFullscreen(mermaidEl);
          });
          wrap.insertBefore(btn, wrap.firstChild);
        });
      }

      var tocLinks = document.querySelectorAll('nav.toc-rail a');
      var sections = Array.from(tocLinks).map(function (a) {
        return document.querySelector(a.getAttribute('href'));
      }).filter(Boolean);

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            var id = '#' + e.target.id;
            tocLinks.forEach(function (a) {
              a.classList.toggle('active', a.getAttribute('href') === id);
            });
          }
        });
      }, { rootMargin: '-20% 0px -60% 0px' });
      sections.forEach(function (s) { observer.observe(s); });

      var bar = document.getElementById('scrollProgress');
      window.addEventListener('scroll', function () {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
      }, { passive: true });

      var tocRail = document.querySelector('nav.toc-rail');
      var tocWrap = document.querySelector('.toc-rail-wrap');
      var tocInner = document.querySelector('nav.toc-rail .toc-inner');
      var heroEl = document.querySelector('.hero');
      var footerEl = document.querySelector('footer');
      var tocInset = 24;
      var tocGap = 16;
      var tocTicking = false;

      function resetTocRail() {
        if (!tocRail) return;
        tocRail.style.cssText = '';
        if (tocInner) tocInner.style.transform = '';
      }

      function updateTocRail() {
        if (!tocRail || !tocWrap || !tocInner || window.innerWidth <= 900) {
          resetTocRail();
          return;
        }

        var vh = window.innerHeight;
        var bandTop = tocInset;
        var bandBottom = vh - tocInset;

        if (heroEl) {
          var heroBottom = heroEl.getBoundingClientRect().bottom;
          if (heroBottom > bandTop) bandTop = heroBottom + tocGap;
        }

        if (footerEl) {
          var footerTop = footerEl.getBoundingClientRect().top;
          if (footerTop < bandBottom) bandBottom = footerTop - tocGap;
        }

        var bandHeight = Math.max(bandBottom - bandTop, 80);
        var wrapRect = tocWrap.getBoundingClientRect();
        var shellVisible = wrapRect.bottom > bandTop && wrapRect.top < bandBottom;

        tocInner.style.transform = 'none';
        var contentHeight = tocInner.offsetHeight;

        if (!shellVisible) {
          tocRail.style.visibility = 'hidden';
          return;
        }

        tocRail.style.visibility = 'visible';
        tocRail.style.top = bandTop + 'px';
        tocRail.style.left = wrapRect.left + 'px';
        tocRail.style.width = wrapRect.width + 'px';
        tocRail.style.height = bandHeight + 'px';

        if (contentHeight <= bandHeight) {
          tocInner.style.transform = 'translateY(' + ((bandHeight - contentHeight) / 2) + 'px)';
        }
      }

      function scheduleTocUpdate() {
        if (tocTicking) return;
        tocTicking = true;
        requestAnimationFrame(function () {
          updateTocRail();
          tocTicking = false;
        });
      }

      scheduleTocUpdate();
      window.addEventListener('scroll', scheduleTocUpdate, { passive: true });
      window.addEventListener('resize', scheduleTocUpdate);
      window.addEventListener('load', scheduleTocUpdate);
    })();
  </script>
</body>
</html>
